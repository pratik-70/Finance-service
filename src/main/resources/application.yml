# -----------------------------------------------------------------------------
# Finance Service Configuration
#
# Centralized application configuration for the Finance Service.
# Contains database connectivity, Flyway migration settings,
# JPA configuration, server properties and environment variable
# mappings used throughout the application.
#
# Author: Pratik Kumar | Xebia Virtual Internship | 70812345pratik@gmail.com
# -----------------------------------------------------------------------------

spring:
  application:
    name: finance-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080